[colors]
background = #1b1a27
background-alt = #31344f
foreground = #bec3ef
primary = #6ba4f6
secondary = #ad7ef7
alert = #f8e4bf
disabled = #31344f

[bar/example]
width = 100%
height = 24pt
radius = 0 

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font;2

modules-left = xworkspaces
modules-center = xwindow
modules-right = pulseaudio date systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 3pt
tray-size = 20

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = #1e1e2e
;#cba6f7
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:42:...%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

interval = 5

format-volume = <bar-volume> <label-volume>
format-volume-padding = 2px

format-muted = <label-muted>
format-muted-padding = 2px

label-volume = %{T2}%percentage%%%{T-}
label-volume-padding = 0

label-muted = MUTED
label-muted-foreground = #666

bar-volume-width = 10
bar-volume-foreground-0 = #ff5555
bar-volume-foreground-1 = #ff7755
bar-volume-foreground-2 = #ff9955
bar-volume-foreground-3 = #ffbb55
bar-volume-foreground-4 = #ffdd55
bar-volume-foreground-5 = #ddff55
bar-volume-foreground-6 = #bbff55
bar-volume-foreground-7 = #99ff55
bar-volume-foreground-8 = #77ff55
bar-volume-foreground-9 = #55ff55
bar-volume-gradient = true
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = #55

[module/date]
type = internal/date
interval = 1

date = %d.%m-%Y %H:%M

label =    %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true
